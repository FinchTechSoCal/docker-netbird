# Combined NetBird Server Configuration (Simplified)
# Generated by getting-started.sh

server:
  listenAddress: ":80"
  exposedAddress: "YourDomainHere:443"
  stunPorts:
    - 3478
  metricsPort: 9090
  healthcheckAddress: ":9000"
  logLevel: "info"
  logFile: "console"

  authSecret: "YourauthSecretHere"
  dataDir: "/var/lib/netbird"

  auth:
    issuer: "YourDomainHere/oauth2"
    signKeyRefreshEnabled: true
    dashboardRedirectURIs:
      - "YourDomainHere/nb-auth"
      - "YourDomainHere/nb-silent-auth"
    cliRedirectURIs:
      - "http://localhost:53000/"

  reverseProxy:
    trustedHTTPProxies:
      - "172.30.0.10/32"

  store:
    engine: "sqlite"
    encryptionKey: "YourencryptionKeyHere"
